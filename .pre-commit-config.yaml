repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.11
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
        files: ^django/
      # Run the formatter.
      - id: ruff-format
        files: ^django/
  - repo: local
    hooks:
    - id: pre-commit-django-migrations
      name: Check django migrations
      entry: sh -c 'mise exec -- django-admin makemigrations --dry-run'
      language: system
      types: [python]
      pass_filenames: false
