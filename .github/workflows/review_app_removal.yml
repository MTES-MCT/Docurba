name: 🔪 Review app removal # TODO

# Run this pipeline when a pull request having the label "review-app" is closed.
on:
  pull_request:
    types: [ unlabeled, closed ]

env:
  BRANCH: ${{ github.head_ref }}
  PR_ID: ${{ github.event.number }}

jobs:
  delete:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'recette-jetable' || contains( github.event.pull_request.labels.*.name, 'recette-jetable')
    permissions: {}

    steps:
    - name: 📥 Checkout to the PR branch
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: 🏷 Set review app name
      run:
        echo "REVIEW_APP_NAME=`echo \"docurba-pr-${PR_ID}-${BRANCH}\" | sed -r 's/[^[:alnum:]-]+/-/g' | head -c 63`" >> $GITHUB_ENV

    # - name: 🗑 Delete S3 bucket
    #   run: |
    #     pip install boto3
    #     scripts/delete-bucket

    # - name: 🗑 Delete the Nuxt2 and Django applications
    #   run: |
    #     echo "Not needed as review apps are dropped automatically by Scalingo."

    - name: Installation de Scalingo CLI
      uses: scalingo-community/setup-scalingo@87fe86eedc708ffb9d232c756b21f6a5784f6c8a # v0.1.1
      with:
        api_token: ${{ secrets.SCALINGO_API_TOKEN }}
        region: 'osc-fr1'

    - name: 🗑 Delete the Nuxt3 application
      run: |
        nuxt_3_app_name="nuxt3-${REVIEW_APP_NAME}"
        scalingo destroy --app "${nuxt_3_app_name}" --force


    - name: Initialize Supabase CLI
      uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51
      with:
        version: latest

    - name: 🗑 Delete Supabase's branch dedicated to this review app.
      run: |
        supabase branches --experimental --project-ref "${SUPABASE_PROJECT_ID}" delete "${REVIEW_APP_NAME}"
